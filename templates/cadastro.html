<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FinanceControl вЂ“ Cadastro</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body class="auth-page">

  <div class="auth-container">
    <div class="auth-card auth-card-wide">

      <div class="auth-logo">
        <span class="brand-icon-lg">рџ’°</span>
        <h1 class="brand-title">FinanceControl</h1>
        <p class="brand-subtitle">Crie sua conta e comece a controlar suas finanГ§as</p>
      </div>

      <form class="auth-form" id="formCadastro" novalidate>
        <h2>Criar conta</h2>

        <div id="cadastroError" style="color: #ff6b6b; font-size: 0.85rem; margin-bottom: 16px; display: none;"></div>

        <div class="form-row">
          <div class="form-group">
            <label for="nome">Nome completo</label>
            <input type="text" id="nome" name="nome"
                   placeholder="Seu nome completo" autocomplete="name" required />
            <span class="field-error" id="nomeError"></span>
          </div>

          <div class="form-group">
            <label for="cpf">CPF</label>
            <input type="text" id="cpf" name="cpf"
                   placeholder="000.000.000-00" maxlength="14" required />
            <span class="field-error" id="cpfError"></span>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="emailCad">E-mail</label>
            <input type="email" id="emailCad" name="email"
                   placeholder="seu@email.com" autocomplete="email" required />
            <span class="field-error" id="emailCadError"></span>
          </div>

          <div class="form-group">
            <label for="telefone">Telefone</label>
            <input type="tel" id="telefone" name="telefone"
                   placeholder="(00) 00000-0000" maxlength="15" />
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="senhaCad">Senha</label>
            <div class="input-password">
              <input type="password" id="senhaCad" name="senha"
                     placeholder="MГ­nimo 6 caracteres" autocomplete="new-password" required />
              <button type="button" class="toggle-password" data-target="senhaCad" aria-label="Mostrar senha">рџ‘Ѓ</button>
            </div>
            <span class="field-error" id="senhaCadError"></span>
          </div>

          <div class="form-group">
            <label for="confirmarSenha">Confirmar senha</label>
            <div class="input-password">
              <input type="password" id="confirmarSenha" name="confirmarSenha"
                     placeholder="Repita a senha" autocomplete="new-password" required />
              <button type="button" class="toggle-password" data-target="confirmarSenha" aria-label="Mostrar senha">рџ‘Ѓ</button>
            </div>
            <span class="field-error" id="confirmarSenhaError"></span>
          </div>
        </div>

        <button type="submit" class="btn-primary btn-full">Criar conta</button>

        <p class="auth-switch">
          JГЎ tem uma conta? <a href="{{ url_for('login') }}" class="link-primary">Entrar</a>
        </p>
      </form>
    </div>
  </div>

  <script>
    // Toggle senhas visГ­veis
    document.querySelectorAll('.toggle-password').forEach(function (btn) {
      btn.addEventListener('click', function () {
        const targetId = this.dataset.target;
        const input = document.getElementById(targetId);
        input.type = input.type === 'password' ? 'text' : 'password';
      });
    });

    // MГЎscara CPF
    document.getElementById('cpf').addEventListener('input', function () {
      let v = this.value.replace(/\D/g, '').slice(0, 11);
      v = v.replace(/(\d{3})(\d)/, '$1.$2');
      v = v.replace(/(\d{3})(\d)/, '$1.$2');
      v = v.replace(/(\d{3})(\d{1,2})$/, '$1-$2');
      this.value = v;
    });

    // MГЎscara telefone
    document.getElementById('telefone').addEventListener('input', function () {
      let v = this.value.replace(/\D/g, '').slice(0, 11);
      v = v.replace(/(\d{2})(\d)/, '($1) $2');
      v = v.replace(/(\d{5})(\d)/, '$1-$2');
      this.value = v;
    });

    // ValidaГ§ГЈo e envio
    document.getElementById('formCadastro').addEventListener('submit', async function (e) {
      e.preventDefault();
      let valid = true;

      const limpar = (id) => { document.getElementById(id).textContent = ''; };
      const erro = (id, msg) => { document.getElementById(id).textContent = msg; valid = false; };

      ['nomeError','emailCadError','cpfError','senhaCadError','confirmarSenhaError']
        .forEach(limpar);
      document.getElementById('cadastroError').style.display = 'none';

      const nome = document.getElementById('nome').value.trim();
      const email = document.getElementById('emailCad').value.trim();
      const cpf = document.getElementById('cpf').value.replace(/\D/g,'');
      const telefone = document.getElementById('telefone').value;
      const senha = document.getElementById('senhaCad').value;
      const confirmar = document.getElementById('confirmarSenha').value;

      if (nome.length < 3) erro('nomeError', 'Informe seu nome completo.');
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) erro('emailCadError', 'Informe um e-mail vГЎlido.');
      if (cpf.length !== 11) erro('cpfError', 'CPF invГЎlido. Informe 11 dГ­gitos.');
      if (senha.length < 6) erro('senhaCadError', 'A senha deve ter pelo menos 6 caracteres.');
      if (senha !== confirmar) erro('confirmarSenhaError', 'As senhas nГЈo coincidem.');

      if (!valid) return;

      try {
        const response = await fetch('{{ url_for("cadastro") }}', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            nome, email, cpf, telefone, senha, confirmar_senha: confirmar
          })
        });

        const data = await response.json();

        if (data.success) {
          alert('Cadastro realizado com sucesso! FaГ§a login para continuar.');
          window.location.href = data.redirect;
        } else {
          document.getElementById('cadastroError').textContent = data.error || 'Erro ao criar conta';
          document.getElementById('cadastroError').style.display = 'block';
        }
      } catch (error) {
        document.getElementById('cadastroError').textContent = 'Erro de conexГЈo. Tente novamente.';
        document.getElementById('cadastroError').style.display = 'block';
      }
    });
  </script>

</body>
</html>
